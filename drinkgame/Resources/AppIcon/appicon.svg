<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Beer icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06153A"/>
      <stop offset="100%" stop-color="#081E4D"/>
    </linearGradient>

    <radialGradient id="halo" cx="50%" cy="35%" r="62%">
      <stop offset="0%" stop-color="#8ED6FF" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#8ED6FF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#8ED6FF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD976"/>
      <stop offset="45%" stop-color="#F0B53A"/>
      <stop offset="100%" stop-color="#C88512"/>
    </linearGradient>

    <linearGradient id="goldDeep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE9A5"/>
      <stop offset="38%" stop-color="#F2C65C"/>
      <stop offset="100%" stop-color="#A56605"/>
    </linearGradient>

    <linearGradient id="foam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#F4E8C7"/>
      <stop offset="100%" stop-color="#E7D39D"/>
    </linearGradient>

    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFF9E3" stop-opacity="0.95"/>
      <stop offset="18%" stop-color="#FFF9E3" stop-opacity="0.25"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFF9E3" stop-opacity="0.92"/>
    </linearGradient>

    <linearGradient id="beerFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD447"/>
      <stop offset="42%" stop-color="#F4B425"/>
      <stop offset="100%" stop-color="#C97906"/>
    </linearGradient>

    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.42"/>
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0"/>
    </linearGradient>

    <filter id="shadow" x="-25%" y="-25%" width="150%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#02101F" flood-opacity="0.50"/>
    </filter>

    <clipPath id="mugClip">
      <path d="M362 412
               H662
               C684 412 702 430 702 452
               V720
               C702 781 652 831 591 831
               H433
               C372 831 322 781 322 720
               V452
               C322 430 340 412 362 412
               Z"/>
    </clipPath>

    <clipPath id="foamClip">
      <path d="M332 362
               C332 326 361 297 398 297
               H626
               C663 297 692 326 692 362
               V392
               H332
               Z"/>
    </clipPath>
  </defs>

  <rect width="1024" height="1024" rx="160" fill="url(#bg)"/>
  <circle cx="512" cy="382" r="360" fill="url(#halo)"/>

  <!-- Outer emblem ring -->
  <circle cx="512" cy="512" r="389" fill="none" stroke="#E7B14A" stroke-width="10"/>
  <circle cx="512" cy="512" r="365" fill="none" stroke="#D8962F" stroke-width="7" opacity="0.95"/>

  <!-- Bottom dot -->
  <circle cx="512" cy="892" r="13" fill="#E7B14A"/>

  <!-- Side laurel-like leaves -->
  <g fill="url(#gold)" opacity="0.97">
    <g transform="translate(214 330)">
      <path d="M0 0 C24 20 31 44 22 76 C6 52 -3 28 0 0Z"/>
      <path d="M18 70 C42 90 49 116 40 148 C24 124 15 98 18 70Z"/>
      <path d="M33 142 C58 160 66 186 58 218 C42 194 34 168 33 142Z"/>
      <path d="M44 214 C70 234 78 260 70 292 C54 268 46 242 44 214Z"/>
      <path d="M46 286 C72 306 80 332 72 364 C56 340 48 314 46 286Z"/>
      <path d="M44 358 C66 376 74 402 67 432 C51 410 44 386 44 358Z"/>
    </g>
    <g transform="translate(810 330) scale(-1 1)">
      <path d="M0 0 C24 20 31 44 22 76 C6 52 -3 28 0 0Z"/>
      <path d="M18 70 C42 90 49 116 40 148 C24 124 15 98 18 70Z"/>
      <path d="M33 142 C58 160 66 186 58 218 C42 194 34 168 33 142Z"/>
      <path d="M44 214 C70 234 78 260 70 292 C54 268 46 242 44 214Z"/>
      <path d="M46 286 C72 306 80 332 72 364 C56 340 48 314 46 286Z"/>
      <path d="M44 358 C66 376 74 402 67 432 C51 410 44 386 44 358Z"/>
    </g>
  </g>

  <!-- Top hop emblem -->
  <g transform="translate(512 238)" filter="url(#shadow)">
    <path d="M0 -72
             C20 -54 31 -34 32 -10
             C32 14 19 33 0 47
             C-19 33 -32 14 -32 -10
             C-31 -34 -20 -54 0 -72Z" fill="url(#goldDeep)" stroke="#FFF5D0" stroke-width="6"/>
    <path d="M-34 -48 C-63 -32 -76 -6 -74 25 C-54 12 -39 -8 -34 -48Z" fill="url(#gold)" stroke="#FFF5D0" stroke-width="5"/>
    <path d="M34 -48 C63 -32 76 -6 74 25 C54 12 39 -8 34 -48Z" fill="url(#gold)" stroke="#FFF5D0" stroke-width="5"/>
    <path d="M-22 6 C-54 24 -69 53 -69 84 C-38 72 -20 47 -22 6Z" fill="url(#gold)" stroke="#FFF5D0" stroke-width="5"/>
    <path d="M22 6 C54 24 69 53 69 84 C38 72 20 47 22 6Z" fill="url(#gold)" stroke="#FFF5D0" stroke-width="5"/>
    <path d="M0 15 C13 26 18 41 18 56 C10 50 3 42 0 15Z" fill="#A56808" opacity="0.55"/>
  </g>

  <!-- Decorative rays -->
  <g stroke="#E7B14A" stroke-width="12" stroke-linecap="round" opacity="0.95">
    <path d="M378 246 L418 279"/>
    <path d="M353 289 L408 313"/>
    <path d="M646 246 L606 279"/>
    <path d="M671 289 L616 313"/>
  </g>

  <!-- Mug and foam -->
  <g filter="url(#shadow)">
    <!-- Handle -->
    <path d="M676 446
             C739 446 789 496 789 559
             C789 622 739 672 676 672"
          fill="none" stroke="#FFFDF2" stroke-width="34" stroke-linecap="round"/>
    <path d="M676 488
             C716 488 747 519 747 559
             C747 598 716 630 676 630"
          fill="none" stroke="#0D1B33" stroke-opacity="0.22" stroke-width="11" stroke-linecap="round"/>

    <!-- Body -->
    <path d="M362 412
             H662
             C684 412 702 430 702 452
             V720
             C702 781 652 831 591 831
             H433
             C372 831 322 781 322 720
             V452
             C322 430 340 412 362 412
             Z"
          fill="#F6F1E3" opacity="0.22" stroke="#FFFDF2" stroke-width="14" stroke-linejoin="round"/>

    <!-- Beer fill -->
    <g clip-path="url(#mugClip)">
      <rect x="326" y="446" width="380" height="430" fill="url(#beerFill)"/>
      <path d="M326 442 H702 V567
               C653 560 617 550 512 550
               C414 550 376 560 326 567 Z"
            fill="url(#glass)" opacity="0.95"/>
      <path d="M370 458 C390 478 390 811 382 845" stroke="#FFF9E3" stroke-opacity="0.52" stroke-width="20" stroke-linecap="round"/>
      <path d="M618 470 C632 495 635 777 628 836" stroke="#FFF9E3" stroke-opacity="0.40" stroke-width="16" stroke-linecap="round"/>
      <path d="M385 575
               C385 552 402 536 425 536
               H456
               C473 536 487 550 487 567
               V790
               C487 805 475 818 460 818
               H425
               C402 818 385 801 385 778
               Z"
            fill="#FFD84A" opacity="0.22"/>
      <path d="M512 551
               C542 551 563 571 563 600
               V807
               C563 820 553 831 540 831
               H484
               C471 831 461 820 461 807
               V600
               C461 571 482 551 512 551Z"
            fill="#FFF5B2" opacity="0.12"/>
      <g fill="#FFF7D9" opacity="0.95">
        <circle cx="407" cy="620" r="7"/>
        <circle cx="430" cy="645" r="4"/>
        <circle cx="431" cy="690" r="6"/>
        <circle cx="443" cy="724" r="5"/>
        <circle cx="513" cy="646" r="10"/>
        <circle cx="512" cy="699" r="12"/>
        <circle cx="511" cy="749" r="7"/>
        <circle cx="590" cy="621" r="6"/>
        <circle cx="607" cy="658" r="4"/>
        <circle cx="585" cy="705" r="8"/>
        <circle cx="599" cy="742" r="5"/>
      </g>

      <!-- Vertical grooves -->
      <g fill="none" stroke="#FFD45C" stroke-width="8" opacity="0.90" stroke-linecap="round">
        <path d="M362 516 V796"/>
        <path d="M420 496 V811"/>
        <path d="M478 484 V821"/>
        <path d="M546 484 V821"/>
        <path d="M604 496 V811"/>
        <path d="M662 516 V796"/>
      </g>
      <g fill="none" stroke="#A66005" stroke-width="6" opacity="0.30" stroke-linecap="round">
        <path d="M372 521 V792"/>
        <path d="M430 503 V805"/>
        <path d="M488 492 V818"/>
        <path d="M556 492 V818"/>
        <path d="M614 503 V805"/>
        <path d="M672 521 V792"/>
      </g>
    </g>

    <!-- Foam fitted to glass -->
    <g clip-path="url(#foamClip)">
      <ellipse cx="512" cy="364" rx="180" ry="58" fill="url(#foam)" stroke="#FFFDF2" stroke-width="10"/>
      <ellipse cx="512" cy="372" rx="176" ry="50" fill="#FFF8E8" opacity="0.55"/>
      <g fill="#FFFFFF" opacity="0.92">
        <circle cx="425" cy="353" r="10"/>
        <circle cx="472" cy="337" r="12"/>
        <circle cx="512" cy="354" r="8"/>
        <circle cx="548" cy="334" r="11"/>
        <circle cx="594" cy="351" r="9"/>
      </g>
      <g fill="#E7C67A" opacity="0.65">
        <circle cx="398" cy="371" r="4"/>
        <circle cx="442" cy="375" r="3"/>
        <circle cx="618" cy="374" r="4"/>
        <circle cx="572" cy="380" r="3"/>
      </g>
    </g>

    <!-- Top rim -->
    <path d="M350 401
             H674
             C680 401 686 407 686 413
             V420
             C686 431 677 440 666 440
             H358
             C347 440 338 431 338 420
             V413
             C338 407 344 401 350 401Z"
          fill="#0E2448"/>
    <path d="M354 404
             H670
             C675 404 680 408 680 413
             V418
             C680 426 673 433 665 433
             H359
             C351 433 344 426 344 418
             V413
             C344 408 349 404 354 404Z"
          fill="none" stroke="#FFFDF2" stroke-width="8"/>

    <!-- Foot -->
    <ellipse cx="512" cy="842" rx="138" ry="22" fill="#FFFDF2" opacity="0.95"/>
    <ellipse cx="512" cy="842" rx="104" ry="14" fill="#D9A146" opacity="0.52"/>
    <ellipse cx="512" cy="842" rx="92" ry="10" fill="#FFFFFF" opacity="0.28"/>
  </g>

  <!-- Small base shadow -->
  <ellipse cx="512" cy="852" rx="160" ry="28" fill="#02101F" opacity="0.35"/>
</svg>
